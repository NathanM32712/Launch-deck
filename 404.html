<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Not Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: radial-gradient(circle at top, #1a0f2a 0, #050008 60%);
        color: #d8b6ff;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding-top: 140px;
        user-select: none;
    }

    .box {
        background: #120a1b;
        border: 1px solid #2d1a3d;
        border-radius: 16px;
        padding: 40px;
        max-width: 420px;
        margin: 0 auto;
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.25);
    }

    h1 {
        font-size: 42px;
        margin-bottom: 12px;
        color: #c58cff;
        text-shadow: 0 0 12px rgba(138, 43, 226, 0.5);
    }

    p {
        font-size: 20px;
        color: #e6d4ff;
        margin-top: 0;
    }

    button {
        margin-top: 25px;
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        background: #8a2be2;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #a45cff;
        box-shadow: 0 0 12px rgba(138, 43, 226, 0.6);
    }
</style>
</head>
<body>

<div class="box">
    <h1>404</h1>
    <p>If you see this, something went wrong.</p>
    <p>Try refreshing the page or clicking a new tab.</p>

    <button onclick="location.reload()">Refresh</button>
</div>

</body>
</html>

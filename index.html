<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Launch Deck</title>
<link rel="icon" type="image/png" href="icons/icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Load tab registry -->
<script src="tabs/tabs.js"></script>

<style>
    :root {
        --bg: #050509;
        --border: #26263a;
        --accent: #8a2be2;
        --text: #f5f5ff;
        --text-muted: #a0a0c0;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background: radial-gradient(circle at top, #1b1030 0, #050509 55%);
        color: var(--text);
        font-family: system-ui, sans-serif;
        overflow: hidden;
    }
    #root {
        display: flex;
        height: 100vh;
        width: 100vw;
        padding: 10px;
        gap: 10px;
    }

    /* SIDEBAR */
    .sidebar {
        width: 72px;
        background: #0c0c14;
        border-radius: 16px;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 6px;
        gap: 10px;
    }
    .sidebar-logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: radial-gradient(circle at 30% 0, #c58cff, #6b3fd1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 20px;
        box-shadow: 0 0 18px rgba(138, 43, 226, 0.7);
    }
    .sidebar-group-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: #11111a;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.18s ease;
    }
    .sidebar-group-icon.active {
        border-color: var(--accent);
        box-shadow: 0 0 12px rgba(138,43,226,0.7);
    }
    .sidebar-group-icon img {
        width: 26px;
        height: 26px;
        image-rendering: pixelated;
    }
    .sidebar-spacer { flex: 1; }
    .sidebar-footer {
        font-size: 10px;
        color: var(--text-muted);
        text-align: center;
        opacity: 0.7;
    }

    /* MAIN */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #050509;
        border-radius: 16px;
        border: 1px solid var(--border);
        overflow: hidden;
    }

    /* GROUP TABS */
    .group-tabs-container {
        height: 52px;
        border-bottom: 1px solid var(--border);
        background: #0a0a12;
        display: flex;
        align-items: center;
        padding-left: 10px;
        gap: 6px;
    }
    .group-tab {
        padding: 0 16px;
        height: 40px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: var(--text-muted);
        border-radius: 10px;
        transition: 0.2s;
    }
    .group-tab.active {
        background: rgba(138,43,226,0.25);
        color: var(--text);
        box-shadow: 0 0 10px rgba(138,43,226,0.6);
    }
    .group-tab-icon img {
        width: 18px;
        height: 18px;
        image-rendering: pixelated;
    }

    /* TABS */
    .tabs-row {
        height: 40px;
        display: flex;
        border-bottom: 1px solid var(--border);
        background: #080812;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .tabs-row::-webkit-scrollbar { display: none; }

    .tab {
        flex: 0 0 auto;
        min-width: 120px;
        height: 40px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        cursor: pointer;
        color: var(--text-muted);
        border-right: 1px solid rgba(255,255,255,0.03);
    }
    .tab.active {
        background: rgba(138,43,226,0.35);
        color: var(--text);
    }
    .tab-icon img {
        width: 14px;
        height: 14px;
        image-rendering: pixelated;
    }

    /* USER BAR */
    .user-bar {
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        gap: 12px;
        background: #050509;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-muted);
    }
    .user-pill {
        padding: 4px 10px;
        border-radius: 999px;
        background: #10101a;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .user-role {
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        background: rgba(138,43,226,0.15);
        border: 1px solid rgba(138,43,226,0.7);
        color: #d9c4ff;
    }

    #welcomeBox {
        font-size: 18px;
        color: #cfa8ff;
        padding-left: 12px;
    }

    .content { flex: 1; position: relative; }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: #050509;
    }
</style>
</head>
<body>

<script>
// ---------------- BANNED CHECK ----------------
if (document.cookie.includes("banned=true")) {
    window.location.href = "/banned.html";
}
</script>

<div id="root">
    <div class="sidebar">
<img class="sidebar-logo" src="icons/icon.png" onclick="window.location.href='index.html'">

        <div class="sidebar-group-icon" data-group="info"><img src="icons/info.png"></div>
        <div class="sidebar-group-icon" data-group="tools"><img src="icons/tools.png"></div>
        <div class="sidebar-group-icon" data-group="games"><img src="icons/games.png"></div>
        <div class="sidebar-group-icon" data-group="casino"><img src="icons/casino.png"></div>
        <div class="sidebar-group-icon" data-group="admin"><img src="icons/admin.png"></div>

        <div class="sidebar-spacer"></div>
        <div class="sidebar-footer">Launch Deck<br>v1.0</div>
    </div>

    <div class="main">
        <div class="group-tabs-container" id="groupTabs"></div>
        <div class="tabs-row" id="tabsRow"></div>

        <div class="user-bar">
            <div id="welcomeBox"></div>
            <div class="user-pill"><span id="userNameLabel">Guest</span></div>
            <div class="user-role" id="userRoleLabel">GUEST</div>
        </div>

        <div class="content">
            <iframe id="mainFrame" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
/* ---------------- AUTH COOKIE READER ---------------- */
function getAuth() {
    const match = document.cookie.match(/auth=([^;]+)/);
    if (!match) return null;

    const raw = match[1];
    const parts = raw.split("|");
    const data = {};

    parts.forEach(p => {
        const [key, val] = p.split(":");
        data[key] = decodeURIComponent(val || "");
    });

    return data;
}

/* ---------------- USER STATE ---------------- */
window.user = {
    loggedIn: false,
    userid: "Guest",
    role: "guest",
    display: ""
};

function loadUserFromCookie() {
    const auth = getAuth();
    if (!auth || auth.userlogin !== "true") return;

    window.user.loggedIn = true;
    window.user.userid = auth.userid || "User";
    window.user.display = auth.displayname || auth.userid || "User";
    window.user.role = auth.role || "user";
}

/* ---------------- ROLE SYSTEM ---------------- */
const roleRank = { guest: 0, user: 1, admin: 2, owner: 3 };
function canSee(role) { return roleRank[window.user.role] >= roleRank[role]; }

/* ---------------- UI ---------------- */
function updateUserBar() {
    document.getElementById("userNameLabel").textContent = window.user.userid;
    document.getElementById("userRoleLabel").textContent = window.user.role.toUpperCase();

    const welcome = document.getElementById("welcomeBox");
    welcome.textContent = window.user.loggedIn ? `Welcome, ${window.user.display}` : "";
}

/* ---------------- TAB SYSTEM ---------------- */
function formatName(filename) {
    return filename
        .replace(".html", "")
        .replace(/-/g, " ")
        .replace(/_/g, " ")
        .replace(/\d+/g, m => " " + m)
        .replace(/\b\w/g, c => c.toUpperCase())
        .trim();
}

async function loadAllTabs() {
    return window.launchdeckTabs.map(entry => {
        const [path, requiredRole] = entry.split("|");
        const [group, file] = path.split("/");

        return {
            file: "tabs/" + path,
            group,
            name: formatName(file),
            icon: "icons/" + group + ".png",
            requiredRole: requiredRole || "guest"
        };
    });
}

function buildGroupTabs(groups) {
    const container = document.getElementById("groupTabs");
    container.innerHTML = "";

    for (const group of Object.keys(groups)) {
        const div = document.createElement("div");
        div.className = "group-tab";
        div.dataset.group = group;
        div.innerHTML = `
            <div class="group-tab-icon"><img src="icons/${group}.png"></div>
            <span>${group.charAt(0).toUpperCase() + group.slice(1)}</span>
        `;
        div.onclick = () => setActiveGroup(group);
        container.appendChild(div);
    }
}

function buildTabs(groupTabs) {
    const row = document.getElementById("tabsRow");
    row.innerHTML = "";

    for (const tab of groupTabs) {
        const div = document.createElement("div");
        div.className = "tab";
        div.dataset.file = tab.file;
        div.innerHTML = `
            <div class="tab-icon"><img src="${tab.icon}"></div>
            <span>${tab.name}</span>
        `;
        div.onclick = () => setActiveTab(tab.file);
        row.appendChild(div);
    }
}

function setActiveGroup(group) {
    document.querySelectorAll(".group-tab").forEach(el =>
        el.classList.toggle("active", el.dataset.group === group)
    );

    const groupTabs = window.allTabs.filter(t => {
        if (t.group !== group) return false;
        return roleRank[window.user.role] >= roleRank[t.requiredRole];
    });

    buildTabs(groupTabs);

    if (groupTabs.length > 0) {
        setActiveTab(groupTabs[0].file);
    }
}

function setActiveTab(file) {
    document.querySelectorAll(".tab").forEach(el =>
        el.classList.toggle("active", el.dataset.file === file)
    );
    document.getElementById("mainFrame").src = file;
}

/* ---------------- INIT ---------------- */
(async function init() {
    loadUserFromCookie();
    updateUserBar();

    window.allTabs = await loadAllTabs();

    const groups = {};
    for (const tab of window.allTabs) {
        if (!groups[tab.group]) groups[tab.group] = [];
        groups[tab.group].push(tab);
    }

    buildGroupTabs(groups);

    const firstGroup = Object.keys(groups)[0] || "info";
    setActiveGroup(firstGroup);
})();
</script>

</body>
</html>

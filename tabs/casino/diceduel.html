<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dice Duel</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #cfa8ff;
    }

    .panel {
        background: #14141f;
        border: 1px solid #26263a;
        border-radius: 12px;
        padding: 20px;
        max-width: 480px;
        margin: 0 auto;
    }

    #diceArea {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
    }

    .diceBox {
        background: #1a1a25;
        border: 1px solid #26263a;
        border-radius: 12px;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: #fff;
    }

    input, button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: #0f0f0f;
        color: #fff;
        font-size: 16px;
        margin-bottom: 12px;
    }

    button {
        background: #8a2be2;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 28px;
        font-weight: 700;
    }

    .green { color: #4dff88; }
    .red { color: #ff4d4d; }

    #balance {
        margin-top: 10px;
        font-size: 18px;
        color: #a0a0c0;
    }
</style>
</head>
<body>

<h1>Dice Duel</h1>

<div class="panel">

    <input id="bet" type="number" placeholder="Bet amount">
    <button id="rollBtn">Roll Dice</button>

    <div id="diceArea">
        <div class="diceBox" id="playerDice">🎲</div>
        <div class="diceBox" id="houseDice">🎲</div>
    </div>

    <div id="result"></div>
    <div id="balance"></div>
</div>

<script>
/* ---------------- Login Check ---------------- */
function isLoggedIn() {
    const match = document.cookie.match(/auth=([^;]+)/);
    return match && match[1].includes("userlogin:true");
}

/* ---------------- Shared Casino Balance ---------------- */
function getBalance() {
    if (!isLoggedIn()) return 1000;
    const match = document.cookie.match(/casinoBalance=([^;]+)/);
    return match ? parseFloat(match[1]) : 1000;
}

function setBalance(v) {
    if (!isLoggedIn()) return;
    document.cookie = "casinoBalance=" + v + ";path=/;max-age=31536000";
}

let balance = getBalance();
document.getElementById("balance").textContent = "Balance: $" + balance.toFixed(2);

/* ---------------- Dice Duel Logic ---------------- */
function rollDie() {
    return Math.floor(Math.random() * 6) + 1;
}

document.getElementById("rollBtn").onclick = () => {
    const bet = parseFloat(document.getElementById("bet").value);
    const resultEl = document.getElementById("result");

    if (!bet || bet <= 0) {
        resultEl.textContent = "Enter a valid bet.";
        resultEl.className = "red";
        return;
    }

    if (bet > balance) {
        resultEl.textContent = "Not enough balance.";
        resultEl.className = "red";
        return;
    }

    balance -= bet;
    setBalance(balance);
    document.getElementById("balance").textContent = "Balance: $" + balance.toFixed(2);

    const p1 = rollDie();
    const p2 = rollDie();
    const h1 = rollDie();
    const h2 = rollDie();

    const playerTotal = p1 + p2;
    const houseTotal = h1 + h2;

    document.getElementById("playerDice").textContent = playerTotal;
    document.getElementById("houseDice").textContent = houseTotal;

    if (playerTotal > houseTotal) {
        const win = bet * 2;
        balance += win;
        resultEl.textContent = "WIN +" + win.toFixed(2);
        resultEl.className = "green";
    } else if (playerTotal < houseTotal) {
        resultEl.textContent = "LOSE -" + bet.toFixed(2);
        resultEl.className = "red";
    } else {
        balance += bet;
        resultEl.textContent = "TIE (bet returned)";
        resultEl.className = "green";
    }

    setBalance(balance);
    document.getElementById("balance").textContent = "Balance: $" + balance.toFixed(2);
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 6px;
        color: #cfa8ff;
    }

    p {
        font-size: 14px;
        color: #c8c8e0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .top {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .box {
        background: #14141f;
        border: 1px solid #26263a;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 18px;
        min-width: 120px;
    }

    .board {
        width: 360px;
        height: 360px;
        background: #14141f;
        border-radius: 12px;
        padding: 10px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    .tile {
        width: 100%;
        height: 100%;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        transition: 0.15s;
        color: #fff;
    }

    .t0 { background: #1a1a27; }
    .t2 { background: #8a2be2; }
    .t4 { background: #6b3fd1; }
    .t8 { background: #ff8c42; }
    .t16 { background: #ff6a3d; }
    .t32 { background: #ff4d4d; }
    .t64 { background: #ff3333; }
    .t128 { background: #ffd93d; color: #000; }
    .t256 { background: #ffe75e; color: #000; }
    .t512 { background: #fff07a; color: #000; }
    .t1024 { background: #fff8a6; color: #000; }
    .t2048 { background: #fffcd1; color: #000; }

    .btn {
        margin-top: 20px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        background: #8a2be2;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }

    @media (max-width: 420px) {
        .board {
            width: 300px;
            height: 300px;
        }
        .tile {
            font-size: 22px;
        }
    }
</style>
</head>
<body>

<h1>2048</h1>
<p>Use arrow keys or swipe to combine tiles and reach 2048.</p>

<div class="top">
    <div class="box">Score: <span id="score">0</span></div>
    <div class="box">Best: <span id="best">0</span></div>
</div>

<div class="board" id="board"></div>

<button class="btn" id="newGame">New Game</button>

<script>
/* ---------------- State ---------------- */
let board = [];
let score = 0;
let best = parseInt(localStorage.getItem("best2048") || "0");

document.getElementById("best").textContent = best;

/* ---------------- Helpers ---------------- */
function emptyBoard() {
    board = [];
    for (let i = 0; i < 4; i++) {
        board[i] = [0, 0, 0, 0];
    }
}

function addRandomTile() {
    let empty = [];
    for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
            if (board[r][c] === 0) empty.push({ r, c });

    if (empty.length === 0) return;

    let spot = empty[Math.floor(Math.random() * empty.length)];
    board[spot.r][spot.c] = Math.random() < 0.9 ? 2 : 4;
}

function drawBoard() {
    const boardEl = document.getElementById("board");
    boardEl.innerHTML = "";

    for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
            let v = board[r][c];
            let div = document.createElement("div");
            div.className = "tile t" + v;
            div.textContent = v === 0 ? "" : v;
            boardEl.appendChild(div);
        }
    }

    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
}

/* ---------------- Movement Logic ---------------- */
function slide(row) {
    row = row.filter(v => v !== 0);
    for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i + 1]) {
            row[i] *= 2;
            score += row[i];
            row[i + 1] = 0;
        }
    }
    row = row.filter(v => v !== 0);
    while (row.length < 4) row.push(0);
    return row;
}

function rotateBoard() {
    let newBoard = [[], [], [], []];
    for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
            newBoard[c][3 - r] = board[r][c];
    board = newBoard;
}

function moveLeft() {
    let changed = false;
    for (let r = 0; r < 4; r++) {
        let original = [...board[r]];
        board[r] = slide(board[r]);
        if (original.toString() !== board[r].toString()) changed = true;
    }
    return changed;
}

function moveRight() {
    rotateBoard();
    rotateBoard();
    let changed = moveLeft();
    rotateBoard();
    rotateBoard();
    return changed;
}

function moveUp() {
    rotateBoard();
    rotateBoard();
    rotateBoard();
    let changed = moveLeft();
    rotateBoard();
    return changed;
}

function moveDown() {
    rotateBoard();
    let changed = moveLeft();
    rotateBoard();
    rotateBoard();
    rotateBoard();
    return changed;
}

/* ---------------- Input ---------------- */
document.addEventListener("keydown", e => {
    let moved = false;

    if (e.key === "ArrowLeft") moved = moveLeft();
    if (e.key === "ArrowRight") moved = moveRight();
    if (e.key === "ArrowUp") moved = moveUp();
    if (e.key === "ArrowDown") moved = moveDown();

    if (moved) {
        addRandomTile();
        if (score > best) {
            best = score;
            localStorage.setItem("best2048", best);
        }
        drawBoard();
    }
});

/* ---------------- Touch Controls ---------------- */
let startX = 0, startY = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 30) moveRight();
        else if (dx < -30) moveLeft();
    } else {
        if (dy > 30) moveDown();
        else if (dy < -30) moveUp();
    }

    addRandomTile();
    if (score > best) {
        best = score;
        localStorage.setItem("best2048", best);
    }
    drawBoard();
});

/* ---------------- New Game ---------------- */
document.getElementById("newGame").onclick = startGame;

function startGame() {
    score = 0;
    emptyBoard();
    addRandomTile();
    addRandomTile();
    drawBoard();
}

/* ---------------- Init ---------------- */
startGame();
</script>

</body>
</html>

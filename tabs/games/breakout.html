<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Breakout</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 6px;
        color: #cfa8ff;
    }

    p {
        font-size: 14px;
        color: #c8c8e0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .top {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 16px;
        flex-wrap: wrap;
    }

    .box {
        background: #14141f;
        border: 1px solid #26263a;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 16px;
        min-width: 110px;
    }

    canvas {
        background: #14141f;
        border-radius: 12px;
        border: 2px solid #26263a;
        box-shadow: 0 0 20px rgba(138,43,226,0.4);
        display: block;
        margin: 0 auto;
    }

    .btn {
        margin-top: 16px;
        padding: 8px 16px;
        border-radius: 999px;
        border: none;
        background: #8a2be2;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
    }
</style>
</head>
<body>

<h1>Breakout</h1>
<p>Move the paddle to bounce the ball and clear all the bricks.</p>

<div class="top">
    <div class="box">Score: <span id="score">0</span></div>
    <div class="box">Lives: <span id="lives">3</span></div>
</div>

<canvas id="game" width="480" height="320"></canvas>

<button class="btn" id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");

let score = 0;
let lives = 3;

const paddleHeight = 12;
const paddleWidth = 80;
let paddleX = (canvas.width - paddleWidth) / 2;

const ballRadius = 7;
let x, y, dx, dy;

const brickRowCount = 5;
const brickColumnCount = 8;
const brickWidth = 50;
const brickHeight = 16;
const brickPadding = 8;
const brickOffsetTop = 40;
const brickOffsetLeft = 20;

let bricks = [];

let rightPressed = false;
let leftPressed = false;

function initBricks() {
    bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < brickRowCount; r++) {
            bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
    }
}

function resetBall() {
    x = canvas.width / 2;
    y = canvas.height - 40;
    dx = 3;
    dy = -3;
}

function resetGame() {
    score = 0;
    lives = 3;
    initBricks();
    resetBall();
    updateHUD();
}

function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
}

document.addEventListener("keydown", e => {
    if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
    if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
});

document.addEventListener("keyup", e => {
    if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
    if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
});

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    if (relX > 0 && relX < canvas.width) {
        paddleX = relX - paddleWidth / 2;
    }
});

function drawBall() {
    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#ff8c42";
    ctx.fill();
    ctx.closePath();
}

function drawPaddle() {
    ctx.beginPath();
    ctx.roundRect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight, 6);
    ctx.fillStyle = "#8a2be2";
    ctx.fill();
    ctx.closePath();
}

function drawBricks() {
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            if (bricks[c][r].status === 1) {
                const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                bricks[c][r].x = brickX;
                bricks[c][r].y = brickY;
                ctx.beginPath();
                ctx.roundRect(brickX, brickY, brickWidth, brickHeight, 4);
                ctx.fillStyle = "#3a3a5a";
                ctx.fill();
                ctx.closePath();
            }
        }
    }
}

function collisionDetection() {
    for (let c = 0; c < brickColumnCount; c++) {
        for (let r = 0; r < brickRowCount; r++) {
            const b = bricks[c][r];
            if (b.status === 1) {
                if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                    dy = -dy;
                    b.status = 0;
                    score += 10;
                    updateHUD();
                    if (score === brickRowCount * brickColumnCount * 10) {
                        alert("You cleared all the bricks!");
                        resetGame();
                    }
                }
            }
        }
    }
}

function draw() {
    ctx.fillStyle = "#14141f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawBricks();
    drawBall();
    drawPaddle();
    collisionDetection();

    if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
    if (y + dy < ballRadius) dy = -dy;
    else if (y + dy > canvas.height - ballRadius - 10) {
        if (x > paddleX && x < paddleX + paddleWidth) {
            dy = -dy;
        } else {
            lives--;
            updateHUD();
            if (!lives) {
                alert("Game over");
                resetGame();
            } else {
                resetBall();
            }
        }
    }

    if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 6;
    else if (leftPressed && paddleX > 0) paddleX -= 6;

    x += dx;
    y += dy;

    requestAnimationFrame(draw);
}

document.getElementById("restart").onclick = () => {
    resetGame();
};

resetGame();
draw();
</script>

</body>
</html>

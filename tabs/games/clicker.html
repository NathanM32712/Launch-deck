<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clicker</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 6px;
        color: #cfa8ff;
    }

    p {
        font-size: 14px;
        color: #c8c8e0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .score {
        font-size: 48px;
        font-weight: 700;
        margin-top: 20px;
        color: #8a2be2;
        text-shadow: 0 0 12px rgba(138,43,226,0.7);
    }

    .cps {
        font-size: 16px;
        color: #a0a0c0;
        margin-bottom: 20px;
    }

    .click-btn {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #c58cff, #6b3fd1);
        border: none;
        cursor: pointer;
        box-shadow: 0 0 25px rgba(138,43,226,0.7);
        transition: transform 0.08s ease;
        font-size: 22px;
        color: white;
        font-weight: 600;
    }

    .click-btn:active {
        transform: scale(0.92);
    }

    .upgrades {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
    }

    .upgrade {
        background: #14141f;
        border: 1px solid #26263a;
        padding: 12px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.15s;
        width: 180px;
    }

    .upgrade:hover {
        background: #1c1c28;
        border-color: #8a2be2;
        box-shadow: 0 0 12px rgba(138,43,226,0.4);
    }

    .upgrade-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
    }

    .upgrade-cost {
        font-size: 13px;
        color: #a0a0c0;
    }
</style>
</head>
<body>

<h1>Clicker</h1>
<p>Click the button to earn points. Buy upgrades to increase your power.</p>

<div class="score" id="score">0</div>
<div class="cps" id="cps">CPS: 0</div>

<button class="click-btn" id="clickBtn">CLICK</button>

<div class="upgrades">
    <div class="upgrade" id="upgrade1">
        <div class="upgrade-title">+1 per click</div>
        <div class="upgrade-cost" id="cost1">Cost: 50</div>
    </div>

    <div class="upgrade" id="upgrade2">
        <div class="upgrade-title">Auto‑Clicker</div>
        <div class="upgrade-cost" id="cost2">Cost: 200</div>
    </div>
</div>

<script>
let score = 0;
let perClick = 1;
let autoClickers = 0;

let cost1 = 50;
let cost2 = 200;

let lastClicks = 0;
let cps = 0;

/* ---------------- Update UI ---------------- */
function updateUI() {
    document.getElementById("score").textContent = score;
    document.getElementById("cps").textContent = "CPS: " + cps;
    document.getElementById("cost1").textContent = "Cost: " + cost1;
    document.getElementById("cost2").textContent = "Cost: " + cost2;
}

/* ---------------- Click Button ---------------- */
document.getElementById("clickBtn").onclick = () => {
    score += perClick;
    lastClicks++;
    updateUI();
};

/* ---------------- Upgrades ---------------- */
document.getElementById("upgrade1").onclick = () => {
    if (score >= cost1) {
        score -= cost1;
        perClick++;
        cost1 = Math.floor(cost1 * 1.8);
        updateUI();
    }
};

document.getElementById("upgrade2").onclick = () => {
    if (score >= cost2) {
        score -= cost2;
        autoClickers++;
        cost2 = Math.floor(cost2 * 2.2);
        updateUI();
    }
};

/* ---------------- Auto Clicker ---------------- */
setInterval(() => {
    if (autoClickers > 0) {
        score += autoClickers;
        updateUI();
    }
}, 1000);

/* ---------------- CPS Tracker ---------------- */
setInterval(() => {
    cps = lastClicks;
    lastClicks = 0;
    updateUI();
}, 1000);

/* ---------------- Init ---------------- */
updateUI();
</script>

</body>
</html>

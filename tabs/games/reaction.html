<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reaction Test</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 6px;
        color: #cfa8ff;
    }

    p {
        font-size: 14px;
        color: #c8c8e0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .game-box {
        width: 100%;
        max-width: 600px;
        height: 300px;
        margin: 0 auto;
        border-radius: 16px;
        background: #14141f;
        border: 2px solid #26263a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        user-select: none;
    }

    .waiting {
        background: #14141f;
        border-color: #26263a;
        color: #c8c8e0;
    }

    .ready {
        background: #8a2be2;
        border-color: #8a2be2;
        color: white;
        box-shadow: 0 0 20px rgba(138,43,226,0.7);
    }

    .too-soon {
        background: #ff4d4d;
        border-color: #ff4d4d;
        color: white;
    }

    .result {
        font-size: 40px;
        margin-top: 20px;
        color: #8a2be2;
        text-shadow: 0 0 12px rgba(138,43,226,0.7);
    }

    .stats {
        margin-top: 20px;
        font-size: 16px;
        color: #a0a0c0;
    }
</style>
</head>
<body>

<h1>Reaction Test</h1>
<p>Wait for the screen to turn <b style="color:#8a2be2">purple</b>, then click as fast as you can.</p>

<div class="game-box waiting" id="gameBox">Click to Start</div>

<div class="result" id="result"></div>

<div class="stats" id="stats">
    Attempts: 0<br>
    Best: —<br>
    Average: —
</div>

<script>
let gameBox = document.getElementById("gameBox");
let resultEl = document.getElementById("result");
let statsEl = document.getElementById("stats");

let waiting = false;
let ready = false;
let startTime = 0;

let attempts = 0;
let best = null;
let total = 0;

/* ---------------- Update Stats ---------------- */
function updateStats() {
    let avg = attempts > 0 ? (total / attempts).toFixed(1) + " ms" : "—";
    let bestText = best !== null ? best + " ms" : "—";

    statsEl.innerHTML = `
        Attempts: ${attempts}<br>
        Best: ${bestText}<br>
        Average: ${avg}
    `;
}

/* ---------------- Start Game ---------------- */
function startWaiting() {
    resultEl.textContent = "";
    gameBox.className = "game-box waiting";
    gameBox.textContent = "Wait for it...";

    waiting = true;
    ready = false;

    let delay = Math.random() * 2000 + 1000; // 1–3 seconds

    setTimeout(() => {
        if (!waiting) return;
        gameBox.className = "game-box ready";
        gameBox.textContent = "CLICK!";
        ready = true;
        waiting = false;
        startTime = performance.now();
    }, delay);
}

/* ---------------- Handle Click ---------------- */
gameBox.onclick = () => {
    // Too early
    if (waiting) {
        gameBox.className = "game-box too-soon";
        gameBox.textContent = "Too Soon!";
        waiting = false;
        ready = false;
        return;
    }

    // Clicked at correct time
    if (ready) {
        let end = performance.now();
        let reaction = Math.round(end - startTime);

        attempts++;
        total += reaction;
        if (best === null || reaction < best) best = reaction;

        resultEl.textContent = reaction + " ms";
        updateStats();

        gameBox.className = "game-box waiting";
        gameBox.textContent = "Click to Try Again";

        ready = false;
        waiting = false;
        return;
    }

    // Start new round
    startWaiting();
};

/* ---------------- Init ---------------- */
updateStats();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
    body {
        margin: 0;
        background: #0b0b12;
        color: #f5f5ff;
        font-family: system-ui, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 6px;
        color: #cfa8ff;
    }

    p {
        font-size: 14px;
        color: #c8c8e0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    .top {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .box {
        background: #14141f;
        border: 1px solid #26263a;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 18px;
        min-width: 120px;
    }

    canvas {
        background: #14141f;
        border: 2px solid #26263a;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(138,43,226,0.4);
        margin-top: 10px;
    }

    .btn {
        margin-top: 20px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        background: #8a2be2;
        color: white;
        cursor: pointer;
        font-size: 14px;
    }
</style>
</head>
<body>

<h1>Snake</h1>
<p>Use arrow keys or swipe to move. Eat food to grow.</p>

<div class="top">
    <div class="box">Score: <span id="score">0</span></div>
    <div class="box">Best: <span id="best">0</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<button class="btn" id="restart">Restart</button>

<script>
/* ---------------- Setup ---------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");

let best = parseInt(localStorage.getItem("snakeBest") || "0");
bestEl.textContent = best;

const size = 20;
const tiles = canvas.width / size;

let snake, dir, food, score, alive;

/* ---------------- Game Init ---------------- */
function resetGame() {
    snake = [{ x: 10, y: 10 }];
    dir = { x: 1, y: 0 };
    score = 0;
    alive = true;
    placeFood();
    updateScore();
}

function placeFood() {
    food = {
        x: Math.floor(Math.random() * tiles),
        y: Math.floor(Math.random() * tiles)
    };
}

/* ---------------- Drawing ---------------- */
function draw() {
    ctx.fillStyle = "#14141f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Food
    ctx.fillStyle = "#ff4d4d";
    ctx.fillRect(food.x * size, food.y * size, size, size);

    // Snake
    ctx.fillStyle = "#8a2be2";
    snake.forEach(s => {
        ctx.fillRect(s.x * size, s.y * size, size, size);
    });
}

/* ---------------- Movement ---------------- */
function update() {
    if (!alive) return;

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= tiles || head.y < 0 || head.y >= tiles) {
        alive = false;
        return;
    }

    // Self collision
    for (let s of snake) {
        if (s.x === head.x && s.y === head.y) {
            alive = false;
            return;
        }
    }

    snake.unshift(head);

    // Food
    if (head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        placeFood();
    } else {
        snake.pop();
    }
}

function updateScore() {
    scoreEl.textContent = score;
    if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem("snakeBest", best);
    }
}

/* ---------------- Input ---------------- */
document.addEventListener("keydown", e => {
    if ((e.key === "ArrowUp" || e.key === "w") && dir.y !== 1) dir = { x: 0, y: -1 };
    if ((e.key === "ArrowDown" || e.key === "s") && dir.y !== -1) dir = { x: 0, y: 1 };
    if ((e.key === "ArrowLeft" || e.key === "a") && dir.x !== 1) dir = { x: -1, y: 0 };
    if ((e.key === "ArrowRight" || e.key === "d") && dir.x !== -1) dir = { x: 1, y: 0 };
});

/* ---------------- Touch Controls ---------------- */
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", e => {
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 20 && dir.x !== -1) dir = { x: 1, y: 0 };
        if (dx < -20 && dir.x !== 1) dir = { x: -1, y: 0 };
    } else {
        if (dy > 20 && dir.y !== -1) dir = { x: 0, y: 1 };
        if (dy < -20 && dir.y !== 1) dir = { x: 0, y: -1 };
    }
});

/* ---------------- Game Loop (Fixed Speed) ---------------- */
let lastTime = 0;
const speed = 120; // ms per move (≈8 moves/sec)

function loop(timestamp) {
    if (timestamp - lastTime > speed) {
        update();
        draw();
        lastTime = timestamp;
    }
    requestAnimationFrame(loop);
}

/* ---------------- Restart ---------------- */
document.getElementById("restart").onclick = () => {
    resetGame();
};

/* ---------------- Init ---------------- */
resetGame();
loop();
</script>

</body>
</html>

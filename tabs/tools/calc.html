<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scientific Calculator</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .calc {
      background: #1e1e1e;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      width: 340px;
    }
    .display {
      width: 100%;
      height: 60px;
      font-size: 24px;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      text-align: right;
      background: #2a2a2a;
      color: #d0a4ff;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      margin-bottom: 6px;
    }
    button {
      flex: 1;
      margin: 2px;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #333;
      color: #eee;
      transition: background 0.15s;
    }
    button.op { background: #444; }
    button.fn { background: #3a2f4f; }
    button.eq { background: #7b3cff; }
    button.mem { background: #2f3f4f; }
    button:hover { background: #555; }
    button.eq:hover { background: #8c54ff; }
  </style>
</head>
<body>
  <div class="calc">
    <input id="display" class="display" type="text" value="0" readonly />

    <!-- Memory / misc row -->
    <div class="row">
      <button class="mem" onclick="memClear()">MC</button>
      <button class="mem" onclick="memRecall()">MR</button>
      <button class="mem" onclick="memStore()">MS</button>
      <button class="mem" onclick="memAdd()">M+</button>
      <button class="mem" onclick="memSub()">M-</button>
    </div>

    <!-- Control row -->
    <div class="row">
      <button class="op" onclick="clearAll()">AC</button>
      <button class="op" onclick="backspace()">⌫</button>
      <button class="op" onclick="insert('%')">%</button>
      <button class="op" onclick="insert('/')">÷</button>
    </div>

    <!-- Number / op rows -->
    <div class="row">
      <button onclick="insert('7')">7</button>
      <button onclick="insert('8')">8</button>
      <button onclick="insert('9')">9</button>
      <button class="op" onclick="insert('*')">×</button>
    </div>
    <div class="row">
      <button onclick="insert('4')">4</button>
      <button onclick="insert('5')">5</button>
      <button onclick="insert('6')">6</button>
      <button class="op" onclick="insert('-')">−</button>
    </div>
    <div class="row">
      <button onclick="insert('1')">1</button>
      <button onclick="insert('2')">2</button>
      <button onclick="insert('3')">3</button>
      <button class="op" onclick="insert('+')">+</button>
    </div>
    <div class="row">
      <button onclick="insert('0')">0</button>
      <button onclick="insert('.')">.</button>
      <button class="eq" onclick="calculate()">=</button>
      <button class="op" onclick="insert('(')">(</button>
    </div>

    <!-- Scientific rows -->
    <div class="row">
      <button class="fn" onclick="insert('sqrt(')">√</button>
      <button class="fn" onclick="insert('^')">x^y</button>
      <button class="fn" onclick="insert(')')">)</button>
      <button class="fn" onclick="insert('1/(')">1/x</button>
    </div>
    <div class="row">
      <button class="fn" onclick="insert('sin(')">sin</button>
      <button class="fn" onclick="insert('cos(')">cos</button>
      <button class="fn" onclick="insert('tan(')">tan</button>
      <button class="fn" onclick="insert('!')">n!</button>
    </div>
    <div class="row">
      <button class="fn" onclick="insert('asin(')">asin</button>
      <button class="fn" onclick="insert('acos(')">acos</button>
      <button class="fn" onclick="insert('atan(')">atan</button>
      <button class="fn" onclick="insert('exp(')">exp</button>
    </div>
    <div class="row">
      <button class="fn" onclick="insert('log10(')">log10</button>
      <button class="fn" onclick="insert('ln(')">ln</button>
      <button class="fn" onclick="insert('pi')">π</button>
      <button class="fn" onclick="insert('e')">e</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    let memory = 0;

    function setDisplay(val) {
      display.value = val.toString();
    }

    function insert(val) {
      if (display.value === "0" || display.value === "Error") {
        display.value = "";
      }
      display.value += val;
    }

    function clearAll() {
      setDisplay("0");
    }

    function backspace() {
      if (display.value.length <= 1 || display.value === "Error") {
        setDisplay("0");
      } else {
        display.value = display.value.slice(0, -1);
      }
    }

    // Memory functions
    function memClear() { memory = 0; }
    function memRecall() { setDisplay(memory); }
    function memStore() {
      const v = safeEval(display.value);
      if (v !== null) memory = v;
    }
    function memAdd() {
      const v = safeEval(display.value);
      if (v !== null) memory += v;
    }
    function memSub() {
      const v = safeEval(display.value);
      if (v !== null) memory -= v;
    }

    // Factorial helper
    function factorial(n) {
      n = Math.floor(n);
      if (n < 0) return NaN;
      let res = 1;
      for (let i = 2; i <= n; i++) res *= i;
      return res;
    }

    function transformExpression(expr) {
      // constants
      expr = expr.replace(/\bpi\b/gi, "Math.PI");
      expr = expr.replace(/\be\b/g, "Math.E");

      // sqrt -> Math.sqrt  (THIS makes sqrt give the square root)
      expr = expr.replace(/sqrt\s*\(/gi, "Math.sqrt(");

      // log10, ln
      expr = expr.replace(/log10\s*\(/gi, "Math.log10(");
      expr = expr.replace(/ln\s*\(/gi, "Math.log(");

      // trig
      expr = expr.replace(/sin\s*\(/gi, "Math.sin(");
      expr = expr.replace(/cos\s*\(/gi, "Math.cos(");
      expr = expr.replace(/tan\s*\(/gi, "Math.tan(");
      expr = expr.replace(/asin\s*\(/gi, "Math.asin(");
      expr = expr.replace(/acos\s*\(/gi, "Math.acos(");
      expr = expr.replace(/atan\s*\(/gi, "Math.atan(");

      // exp
      expr = expr.replace(/exp\s*\(/gi, "Math.exp(");

      // power: a^b -> Math.pow(a,b)
      expr = expr.replace(/(\d+(\.\d+)?|\bMath\.PI\b|\bMath\.E\b|\))\s*\^\s*(\d+(\.\d+)?|\bMath\.PI\b|\bMath\.E\b|\()/g,
        "Math.pow($1,$3)");

      // factorial: n! -> factorial(n)
      expr = expr.replace(/(\d+(\.\d+)?)!/g, "factorial($1)");

      return expr;
    }

    function safeEval(raw) {
      try {
        const expr = transformExpression(raw);
        const result = eval(expr);
        if (typeof result === "number" && isFinite(result)) {
          return result;
        }
        return null;
      } catch {
        return null;
      }
    }

    function calculate() {
      const result = safeEval(display.value);
      if (result === null) {
        setDisplay("Error");
      } else {
        setDisplay(result);
      }
    }
  </script>
</body>
</html>
